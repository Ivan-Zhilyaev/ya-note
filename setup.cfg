[flake8]
max-line-lenght = 79
max-complexity = 10
ignore =
    W503,
    F811,
    D100, D101, D102, D103, D104, D105, D106, D107,
    D203, D204, D205, D213,
    D400, D401,
    N806, N818
exclude =
    */migrations/
    venv/
    env/
per-file-ignores =
  settings.py:E501

[isort]
src_paths=notes
line_length=79
multi_line_output=3
include_trailing_comma=True
force_grid_wrap=0
use_parentheses=True
ensure_newline_before_comments=True
skip=migrations,venv,env
